name: GitHub Pages

on:
  push:
    branches: [main]
    paths: ['landing/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing
      - uses: actions/deploy-pages@v4
        id: deploy
