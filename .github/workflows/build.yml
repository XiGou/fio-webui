name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  CGO_ENABLED: 0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        env:
          CGO_ENABLED: 1
        run: go test -v -race -short ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - os: linux
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          - os: linux
            goos: linux
            goarch: arm
            suffix: linux-arm
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
          - os: windows-latest
            goos: windows
            goarch: arm64
            suffix: windows-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUT=fio-webui-${{ matrix.suffix }}.exe
          else
            OUT=fio-webui-${{ matrix.suffix }}
          fi
          go build -ldflags="-s -w" -o "$OUT" .
          mkdir -p dist && mv "$OUT" dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fio-webui-${{ matrix.suffix }}
          path: dist/
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: fio-webui-*
          path: dist

      - name: Collect binaries for release
        run: |
          mkdir -p release
          find . -type f \( -name 'fio-webui-*' -o -name 'fio-webui-*.exe' \) -exec cp {} release/ \;
          ls -la release/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
