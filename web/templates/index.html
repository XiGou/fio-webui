<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIO WebUI</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/uPlot.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>FIO WebUI</h1>
            <div id="status-indicator" class="status idle">Idle</div>
        </header>

        <main>
            <section class="config-panel">
                <h2>
                    <span>Test Configuration</span>
                    <span class="config-toggle">▶</span>
                </h2>
                
                <div class="config-content">
                    <div class="config-section">
                        <h3>Global Settings</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="ioengine">IO Engine</label>
                                <select id="ioengine" name="ioengine">
                                    {{range .IOEngines}}
                                    <option value="{{.}}" {{if eq . "libaio"}}selected{{end}}>{{.}}</option>
                                    {{end}}
                                </select>
                            </div>
                            <div class="form-group">
                                <input type="checkbox" id="direct" name="direct" checked>
                                <label for="direct">Direct IO</label>
                            </div>
                            <div class="form-group">
                                <label for="runtime">Runtime (sec)</label>
                                <input type="number" id="runtime" name="runtime" value="{{.Global.Runtime}}" min="1">
                            </div>
                            <div class="form-group">
                                 <label for="log_avg_msec">Log Sampling Interval (ms)</label>
                                 <input type="number" id="log_avg_msec" name="log_avg_msec" value="{{.Global.LogAvgMsec}}" min="100">
                                 <small style="color: #666; display: block; margin-top: 4px;">Controls how often FIO samples and logs metrics</small>
                            </div>
                         </div>
                    </div>

                    <div class="config-section">
                        <h3>Job Configuration</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="jobname">Job Name</label>
                                <input type="text" id="jobname" name="jobname" value="{{.Job.Name}}">
                            </div>
                            <div class="form-group">
                                <label for="filename">Filename / Device</label>
                                <input type="text" id="filename" name="filename" value="{{.Job.Filename}}" list="devices-list" placeholder="/dev/sda or /path/to/file">
                                <datalist id="devices-list">
                                    {{range .Devices}}
                                    <option value="{{.}}"></option>
                                    {{end}}
                                </datalist>
                            </div>
                            <div class="form-group">
                                <label for="rw">Read/Write Type</label>
                                <select id="rw" name="rw">
                                    {{range .RWTypes}}
                                    <option value="{{.}}" {{if eq . "randread"}}selected{{end}}>{{.}}</option>
                                    {{end}}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="bs">Block Size</label>
                                <input type="text" id="bs" name="bs" value="4k" placeholder="4k, 8k, or custom" list="bs-list">
                                <datalist id="bs-list">
                                    <option value="512"></option>
                                    <option value="1k"></option>
                                    <option value="2k"></option>
                                    <option value="4k"></option>
                                    <option value="8k"></option>
                                    <option value="16k"></option>
                                    <option value="32k"></option>
                                    <option value="64k"></option>
                                    <option value="128k"></option>
                                    <option value="256k"></option>
                                    <option value="512k"></option>
                                    <option value="1m"></option>
                                    <option value="2m"></option>
                                    <option value="4m"></option>
                                </datalist>
                            </div>
                            <div class="form-group">
                                <label for="size">Test Size</label>
                                <input type="text" id="size" name="size" value="{{.Job.Size}}" placeholder="100m, 1g">
                            </div>
                            <div class="form-group">
                                <label for="numjobs">Number of Jobs</label>
                                <input type="number" id="numjobs" name="numjobs" value="{{.Job.NumJobs}}" min="1">
                            </div>
                            <div class="form-group">
                                <label for="iodepth">IO Depth</label>
                                <input type="number" id="iodepth" name="iodepth" value="{{.Job.IODepth}}" min="1">
                            </div>
                            <div class="form-group" id="rwmixread-group">
                                <label for="rwmixread">Read Percentage (%)</label>
                                <input type="number" id="rwmixread" name="rwmixread" value="{{.Job.RWMixRead}}" min="0" max="100">
                            </div>
                            <div class="form-group">
                                <label for="rate">Rate (e.g., 1m, 500k)</label>
                                <input type="text" id="rate" name="rate" placeholder="Optional, e.g., 1m, 500k">
                            </div>
                        </div>
                        
                        <div style="margin-top: 8px;">
                            <button class="btn btn-secondary" onclick="App.addJob()" style="padding: 8px 16px; width: auto;">Add Job</button>
                        </div>
                        
                        <div class="jobs-list" id="jobs-list"></div>
                    </div>
                </div>

                <div class="actions">
                    <button id="btn-start" class="btn btn-primary">Start Test</button>
                    <button id="btn-stop" class="btn btn-danger" disabled>Stop Test</button>
                </div>
            </section>

            <section class="charts-panel">
                <h2>Real-time Monitoring</h2>
                <div class="chart-toggles">
                    <button class="chart-toggle active" data-chart="bw">
                        <span class="toggle-label">Bandwidth</span>
                    </button>
                    <button class="chart-toggle active" data-chart="iops">
                        <span class="toggle-label">IOPS</span>
                    </button>
                    <button class="chart-toggle active" data-chart="lat">
                        <span class="toggle-label">Latency</span>
                    </button>
                    <button class="chart-toggle active" data-chart="p99">
                        <span class="toggle-label">P99 Latency</span>
                    </button>
                </div>
                <div class="charts-grid">
                    <div class="chart-container" id="chart-bw-container">
                        <h3>Bandwidth (KiB/s)</h3>
                        <div id="chart-bw"></div>
                    </div>
                    <div class="chart-container" id="chart-iops-container">
                        <h3>IOPS</h3>
                        <div id="chart-iops"></div>
                    </div>
                    <div class="chart-container" id="chart-lat-container">
                        <h3>Latency (μs)</h3>
                        <div id="chart-lat"></div>
                    </div>
                    <div class="chart-container" id="chart-p99-container">
                        <h3>P99 Latency (μs)</h3>
                        <div id="chart-p99"></div>
                    </div>
                </div>
            </section>

            <section class="output-panel">
                <h2>Output Log</h2>
                <div id="output" class="output-terminal"></div>
            </section>
        </main>
    </div>

    <script src="/static/js/uPlot.iife.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
