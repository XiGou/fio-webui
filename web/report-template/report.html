<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIO Run Report</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .grid { display: grid; gap: 12px; }
    .grid-4 { grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); }
    .muted { color: #6b7280; font-size: 12px; }
    .error { color: #b91c1c; }
    pre { margin: 0; background: #111827; color: #e5e7eb; padding: 12px; border-radius: 8px; white-space: pre-wrap; word-break: break-word; }
    .toolbar { display:flex; gap:8px; margin-bottom: 10px; }
    button, select { border:1px solid #d1d5db; background:white; border-radius:8px; padding:6px 10px; cursor:pointer; }
    button.active { background:#111827; color:white; border-color:#111827; }
    canvas { width: 100%; height: 320px; border: 1px solid #e5e7eb; border-radius: 8px; }
  </style>
</head>
<body>
<div class="container">
  <h1>FIO 报告</h1>
  <p class="muted" id="meta-line"></p>

  <div class="card">
    <h3>概览卡片</h3>
    <div class="grid grid-4" id="overview"></div>
  </div>

  <div class="card">
    <h3>性能图表</h3>
    <div class="toolbar">
      <button data-metric="iops">IOPS</button>
      <button data-metric="bw">BW</button>
      <button data-metric="lat">Latency</button>
      <select id="timeRange">
        <option value="all">全部</option>
        <option value="15m">15分钟</option>
        <option value="1h">1小时</option>
        <option value="6h">6小时</option>
        <option value="24h">24小时</option>
      </select>
    </div>
    <canvas id="chart" width="1000" height="320"></canvas>
  </div>

  <div class="card">
    <h3>配置与工作流视图</h3>
    <pre id="config"></pre>
  </div>

  <div class="card">
    <h3>错误与告警区</h3>
    <ul id="errors"></ul>
    <h4>日志摘要</h4>
    <pre id="logSummary"></pre>
  </div>
</div>
<script>
  const report = JSON.parse("__REPORT_DATA__");
  let metric = (report.view && report.view.metric) || 'iops';
  let timeRange = (report.view && report.view.time_range) || 'all';

  const byRange = (items) => {
    if (timeRange === 'all' || !items.length) return items;
    const now = items[items.length - 1].time;
    const ranges = { '15m': 900, '1h': 3600, '6h': 21600, '24h': 86400 };
    const sec = ranges[timeRange] || 0;
    if (!sec) return items;
    return items.filter((p) => (now - p.time) <= sec);
  };

  function renderOverview() {
    const sum = (report.meta && report.meta.summary) || {};
    const cards = [
      ['Run ID', report.meta?.id || '-'],
      ['状态', report.meta?.status || '-'],
      ['IOPS', Number(sum.iops || 0).toFixed(0)],
      ['BW(MB/s)', Number(sum.bw || 0).toFixed(2)],
      ['延迟均值(ms)', Number(sum.lat_mean || 0).toFixed(2)],
      ['采样点', String((report.stats || []).length)],
    ];
    document.getElementById('overview').innerHTML = cards.map(([k,v]) => `<div><div class="muted">${k}</div><div>${v}</div></div>`).join('');
    document.getElementById('meta-line').textContent = `导出时间 ${report.exported_at}，开始 ${report.meta?.start_time || '-'}`;
  }

  function pointValue(p) {
    if (metric === 'bw') return p.bw;
    if (metric === 'lat') return p.latMean;
    return p.iops;
  }

  function renderChart() {
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    const data = byRange(report.stats || []);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!data.length) return;
    const vals = data.map(pointValue);
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const pad = 24;
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth = 2;
    ctx.beginPath();
    data.forEach((p, i) => {
      const x = pad + (i * (canvas.width - pad * 2)) / Math.max(1, data.length - 1);
      const y = canvas.height - pad - ((pointValue(p) - min) / Math.max(1e-9, (max - min))) * (canvas.height - pad * 2);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  function renderConfig() {
    document.getElementById('config').textContent = JSON.stringify(report.config || {}, null, 2);
  }

  function renderErrors() {
    const errors = report.errors || [];
    document.getElementById('errors').innerHTML = errors.length ? errors.map((e) => `<li class="error">${e}</li>`).join('') : '<li>无</li>';
    document.getElementById('logSummary').textContent = report.log_summary?.summary || '无';
  }

  document.querySelectorAll('[data-metric]').forEach((btn) => {
    btn.addEventListener('click', () => {
      metric = btn.getAttribute('data-metric');
      document.querySelectorAll('[data-metric]').forEach((b) => b.classList.toggle('active', b === btn));
      renderChart();
    });
    btn.classList.toggle('active', btn.getAttribute('data-metric') === metric);
  });

  const rangeEl = document.getElementById('timeRange');
  rangeEl.value = timeRange;
  rangeEl.addEventListener('change', () => { timeRange = rangeEl.value; renderChart(); });

  renderOverview();
  renderChart();
  renderConfig();
  renderErrors();
</script>
</body>
</html>
